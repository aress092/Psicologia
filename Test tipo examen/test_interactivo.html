<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Interactivo | Estudios de Psicología</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../src/style.css">
  <style>
    /* Estilos específicos para el test interactivo */
    .test-container {
      background: var(--card-bg);
      border: 1px solid #ebe8e4;
      border-top: 8px solid #c9d4db; /* Soft blue top border for the test */
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 15px var(--shadow-color);
      margin-top: 1rem;
    }
    
    .theme-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    
    .btn-theme {
      background: #ffffff;
      border: 1px solid #dcd8d3;
      color: var(--text-muted);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.02);
    }
    
    .btn-theme:hover, .btn-theme.active {
      background: #e3ebf0; /* Soft blue background for active/hover */
      border-color: #c9d4db;
      color: var(--text-main);
      transform: translateY(-2px);
    }

    .question-block {
      display: none;
      animation: fadeIn 0.4s ease-out forwards;
    }

    .question-block.active {
      display: block;
    }

    .question-title {
      font-size: 1.3rem;
      font-family: 'Lora', serif;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: var(--text-main);
    }
    
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option-btn {
      background: #fbfaf9;
      border: 1px solid #e4e1dd;
      color: var(--text-main);
      padding: 1rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 1.05rem;
      text-align: left;
      transition: all 0.2s ease;
    }

    .option-btn:hover:not(:disabled) {
      background: #f0efeb;
      border-color: #d1ccc5;
    }

    .option-btn.correct {
      background: #e6f0e9; /* Soft green */
      border-color: #b2cbb9;
      color: #2e4a36;
      font-weight: 500;
    }

    .option-btn.incorrect {
      background: #fae8e8; /* Soft red */
      border-color: #e6b8b8;
      color: #6b3030;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .justification {
      margin-top: 1.5rem;
      padding: 1.25rem;
      border-radius: 8px;
      background: #f0f4f8; /* Soft blue */
      border-left: 4px solid #a8c1d9;
      color: #4a5c6e;
      display: none;
      animation: slideIn 0.3s ease-out forwards;
    }

    .justification.show {
      display: block;
    }

    .justification h4 {
      color: #385068;
      margin-bottom: 0.5rem;
      font-family: 'Lora', serif;
    }

    .test-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 2.5rem;
      align-items: center;
      border-top: 1px solid #ebe8e4;
      padding-top: 1.5rem;
    }

    .btn-nav {
      background: #eef1f4;
      color: #5c6b7a;
      border: 1px solid #d5dfe8;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .btn-nav:hover:not(:disabled) {
      background: #d5dfe8;
      color: #385068;
    }
    
    .btn-nav:disabled {
      background: #fcfcfc;
      color: #c4c4c4;
      border-color: #efefef;
      cursor: not-allowed;
    }

    .progress-text {
      color: var(--text-muted);
      font-weight: 500;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="../index.html" class="back-link">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Volver al inicio
    </a>
    
    <header>
      <h1>Test Interactivo de Repaso</h1>
      <p class="subtitle">Evalúa tus conocimientos de Aprendizaje y Afectividad</p>
    </header>

    <div class="theme-selector" id="themeSelector">
      <button class="btn-theme active" data-theme="all">🔀 Mezclado</button>
      <button class="btn-theme" data-theme="CC">T1. Condicionamiento Clásico</button>
      <button class="btn-theme" data-theme="CI">T2. Condicionamiento Instrumental</button>
      <button class="btn-theme" data-theme="EM">T3. Emoción</button>
      <button class="btn-theme" data-theme="MO">T4. Motivación</button>
    </div>

    <div class="test-container">
      <div id="quizContainer">
        <!-- Preguntas dinámicas -->
      </div>
      
      <div class="test-controls">
        <button id="btnPrev" class="btn-nav" disabled>Anterior</button>
        <span class="progress-text" id="progressText">Pregunta 1 de X</span>
        <button id="btnNext" class="btn-nav">Siguiente</button>
      </div>
    </div>
  <script src=".preguntas/q_t1.js"></script>
  <script src=".preguntas/q_t2.js"></script>
  <script src=".preguntas/q_t3.js"></script>
  <script src=".preguntas/q_t4.js"></script>
  <script>
    const quizData = [...qT1, ...qT2, ...qT3, ...qT4];

    let currentQuestions = [];
    let currentIndex = 0;

    // Elementos del DOM
    const themeButtons = document.querySelectorAll('.btn-theme');
    const quizContainer = document.getElementById('quizContainer');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const progressText = document.getElementById('progressText');

    // Función para desordenar arrays (Mezclado)
    function shuffleArray(array) {
      let curId = array.length;
      while (0 !== curId) {
        let randId = Math.floor(Math.random() * curId);
        curId -= 1;
        let tmp = array[curId];
        array[curId] = array[randId];
        array[randId] = tmp;
      }
      return array;
    }

    // Inicializar test
    function loadQuestions(theme) {
      if (theme === 'all') {
        currentQuestions = shuffleArray([...quizData]);
      } else {
        currentQuestions = quizData.filter(q => q.theme === theme);
      }
      
      currentIndex = 0;
      renderQuiz();
    }

    // Dibujar preguntas y botones
    function renderQuiz() {
      quizContainer.innerHTML = '';
      
      if (currentQuestions.length === 0) {
        quizContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center;">No hay preguntas para esta categoría.</p>';
        updateControls();
        return;
      }

      currentQuestions.forEach((q, index) => {
        const div = document.createElement('div');
        div.className = `question-block ${index === currentIndex ? 'active' : ''}`;
        
        let optionsHtml = '';
        q.options.forEach((opt, optIndex) => {
          optionsHtml += `<button class="option-btn" data-index="${index}" data-option="${optIndex}">${opt}</button>`;
        });

        div.innerHTML = `
          <h3 class="question-title">${index + 1}. ${q.question}</h3>
          <div class="options-grid">
            ${optionsHtml}
          </div>
          <div class="justification" id="justification-${index}">
            <h4>📚 Justificación</h4>
            <p>${q.justification}</p>
          </div>
        `;
        quizContainer.appendChild(div);
      });

      // Añadir listeners a las opciones
      const options = document.querySelectorAll('.option-btn');
      options.forEach(btn => {
        btn.addEventListener('click', handleOptionClick);
      });

      updateControls();
    }

    // Manejar clic en una opción
    function handleOptionClick(e) {
      const btn = e.target;
      const qIndex = parseInt(btn.getAttribute('data-index'));
      const optIndex = parseInt(btn.getAttribute('data-option'));
      const question = currentQuestions[qIndex];
      
      // Bloquear botones de esta pregunta
      const parentGrid = btn.closest('.options-grid');
      const allBtns = parentGrid.querySelectorAll('.option-btn');
      
      allBtns.forEach(b => b.disabled = true);

      // Marcar colores
      if (optIndex === question.correct) {
        btn.classList.add('correct');
      } else {
        btn.classList.add('incorrect');
        // Marcar también la correcta
        allBtns[question.correct].classList.add('correct');
      }

      // Mostrar justificación
      const justification = document.getElementById(`justification-${qIndex}`);
      justification.classList.add('show');
    }

    // Actualizar botones de navegación
    function updateControls() {
      if (currentQuestions.length === 0) {
        btnPrev.disabled = true;
        btnNext.disabled = true;
        progressText.textContent = '';
        return;
      }

      progressText.textContent = `Pregunta ${currentIndex + 1} de ${currentQuestions.length}`;
      btnPrev.disabled = currentIndex === 0;
      
      if (currentIndex === currentQuestions.length - 1) {
        btnNext.textContent = "Finalizar";
        btnNext.disabled = false;
      } else {
        btnNext.textContent = "Siguiente";
        btnNext.disabled = false;
      }
    }

    // Navegación
    btnPrev.addEventListener('click', () => {
      if (currentIndex > 0) {
        document.querySelectorAll('.question-block')[currentIndex].classList.remove('active');
        currentIndex--;
        document.querySelectorAll('.question-block')[currentIndex].classList.add('active');
        updateControls();
      }
    });

    btnNext.addEventListener('click', () => {
      if (currentIndex < currentQuestions.length - 1) {
        document.querySelectorAll('.question-block')[currentIndex].classList.remove('active');
        currentIndex++;
        document.querySelectorAll('.question-block')[currentIndex].classList.add('active');
        updateControls();
      } else {
        alert("¡Has completado el test! Selecciona otro tema o vuelve a mezclar.");
      }
    });

    // Manejar filtros de temas
    themeButtons.forEach(btn => {
      btn.addEventListener('click', (e) => {
        themeButtons.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        const theme = e.target.getAttribute('data-theme');
        loadQuestions(theme);
      });
    });

    // Cargar mezclado por defecto al iniciar
    loadQuestions('all');

  </script>
</body>
</html>
